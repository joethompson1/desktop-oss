name: Claude Code Review

# Auto-reviews every opened/updated PR. Auth is the CLAUDE_CODE_OAUTH_TOKEN
# repo secret (see .github/workflows/claude.yml header for how to set it up).
# The review prompt is tailored to this project's conventions; Claude also
# reads CLAUDE.md and src/lib/modules/README.md for the full rules.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for desktop-oss — a local-first, modular
            agent workspace (Tauri v2 + SvelteKit, Svelte 5 runes, TS strict).
            Read CLAUDE.md and src/lib/modules/README.md first; they define the
            project's conventions and are the bar to judge against.

            Focus, in priority order:
            1. Architecture conformance — the #1 rule is genericness through
               modularity: a feature should be a drop-in module under
               src/lib/modules/<id>/ wired via GENERIC seams, with NO
               module-specific code in core files. Flag any module leaking into
               core, or a core edit that should have been a generic seam. Keep
               modules/{registry,host,integration,dock-actions}.ts free of
               runes/UI/Tauri so the agent loop stays importable under the
               node:test eval harness.
            2. Correctness bugs — give a concrete repro (inputs → wrong result).
               Watch for Svelte 5 runes misuse (runes only in
               .svelte/.svelte.ts), and the local-first HTTP rule: LLM/provider
               requests MUST use nativeFetch, never window.fetch.
            3. Reuse / simplification, security, and test coverage. Note scope
               creep (one concern per PR).

            Post inline comments on specific lines for concrete issues and a
            single concise top-level summary ending with a clear merge
            recommendation (approve / request changes) ranked by severity. Be
            critical but precise — cite file:line and don't invent issues.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
