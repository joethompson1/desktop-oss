name: Claude Code Review

# Multi-agent PR reviewer. When a PR is opened, a lead Claude (Sonnet 5) fans
# out specialist sub-reviewers (one per lens) and adversarially verifies each
# finding. It only acts when it's requesting changes: if there's a confirmed
# blocker it posts inline comments for all findings and submits a
# request-changes review; if there's no blocker it stays completely silent.
#
# Auth: the CLAUDE_CODE_OAUTH_TOKEN repo secret (generate locally with
# `claude setup-token`, needs Claude Pro/Max). The Claude GitHub App
# (github.com/apps/claude) must be installed on the repo.

on:
  # Runs ONCE per PR — only when it's first opened, not on every subsequent
  # push/commit. (Add `reopened`/`ready_for_review` here if you ever want a
  # fresh review on those events.)
  pull_request:
    types: [opened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Multi-agent PR review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the LEAD reviewer for this PR in desktop-oss — a local-first,
            modular agent workspace (Tauri v2 + SvelteKit, Svelte 5 runes, TS
            strict). Review it with the rigor of a demanding senior engineer:
            correctness, architecture, security, and tests, AND the smaller
            stuff — readability, naming, idiomatic style, nitpicks, and concrete
            general improvements. Read CLAUDE.md and src/lib/modules/README.md
            first; they define the conventions and are the bar to judge against.

            Run the review as a FAN-OUT, not a single pass:

            1) UNDERSTAND — run `gh pr view` and `gh pr diff` for the full diff,
               changed files, and description.

            2) FAN OUT — spawn one Task subagent per lens below, in parallel.
               Give each the diff + its lens; each returns findings as
               {severity: blocker|major|minor|nit, file, line, title, evidence
               (a concrete repro / why it is wrong), fix}:
                 A. Architecture & module-conformance — the #1 rule: features are
                    drop-in modules wired via GENERIC seams, with NO
                    module-specific code in core files;
                    modules/{registry,host,integration,dock-actions}.ts stay
                    runes/UI/Tauri-free (the agent loop must import under the
                    node:test eval harness). Flag any leakage, or a core edit
                    that should have been a generic seam.
                 B. Correctness bugs — logic errors with a concrete repro (inputs
                    → wrong output); Svelte 5 runes misuse (runes only in
                    .svelte/.svelte.ts); the local-first HTTP rule (LLM/provider
                    calls use nativeFetch, never window.fetch).
                 C. UI / UX / styling & a11y — CSS-var usage (no Tailwind, no
                    stray hex), keyboard/aria, colour-only cues, the cockpit +
                    right-dock conventions.
                 D. Security & the Rust/Tauri boundary — new commands /
                    capabilities, unsafe input handling, secret exposure.
                 E. Tests & scope — coverage of new logic with meaningful
                    assertions, over-engineering, and scope creep (a PR should be
                    one concern).
                 F. Code quality / maintainability — readability, naming, dead
                    code, error handling, comments, idiomatic Svelte/TS, and
                    concrete general improvements a senior reviewer would raise.
                    Nitpicks are wanted here.
                 G. CLAUDE.md conformance — go through EVERY CLAUDE.md file that
                    applies to the changed paths (the root CLAUDE.md, plus any
                    nested CLAUDE.md under a directory this PR touches) and check
                    the PR against their rules one by one: the Conventions,
                    Critical pitfalls, Common tasks, and any explicit
                    "must"/"never"/"always" directive. Flag every deviation,
                    quoting the specific CLAUDE.md rule it breaks.

            3) VERIFY (do not skip) — for EACH finding, spawn a skeptic Task
               subagent that re-reads the actual code and returns
               confirmed | refuted | partial with reasoning. Drop refuted
               findings and correct inflated severities. Never post an unverified
               finding.

            4) POST — decide the verdict FIRST: is there at least one CONFIRMED
               blocker?
                 • NO confirmed blocker → do NOTHING. Post no inline comments, no
                   summary, and no review — never a `--comment` or "looks good"
                   review. End the run silently. (The reviewer only ever speaks
                   up when it is requesting changes.)
                 • AT LEAST ONE confirmed blocker → post an INLINE comment via the
                   inline-comment tool on the exact file+line for EVERY confirmed
                   finding — all severities, including minors, nits, and general
                   improvements, no praise — each prefixed with severity, e.g.
                   "**[blocker]** …" / "**[nit]** …", with the reason and a
                   concrete suggested fix. Then submit the verdict:
                     gh pr review <PR NUMBER> --request-changes --body "<summary>"
                   (if GitHub rejects the review event, fall back to
                   `gh pr comment <PR NUMBER> --body "<summary>"`). The summary:
                   a 2–3 sentence read, the confirmed findings grouped by
                   severity (counts + one-liners), and the recommendation.

            Cite file:line, give concrete repros, invent nothing, and never post
            praise. When it does request changes, a senior dev's nitpicks and
            improvement suggestions ARE wanted alongside the blockers.

          claude_args: |
            --model claude-sonnet-5
            --max-turns 60
            --allowedTools "Task,Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment"
