# Release builds. One native runner per OS/arch — each builds its own
# target, so nothing here is arch-specific (the sidecar arch is derived on
# the build host by sidecar/stage.mjs + src-tauri/src/lib.rs). Push a
# `v*` tag (or run manually) to produce a draft GitHub Release with an
# installer per platform attached.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # tauri-action creates the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon (arm64) → *_aarch64.dmg
          - platform: macos-13 # Intel (x64) → *_x64.dmg
          - platform: ubuntu-22.04 # x64 → .deb / .AppImage
          # Windows needs a small tweak first: bun --compile emits a
          # `.exe` and the native `claude`/`cursorsandbox` binaries are
          # `.exe` too, so sidecar/stage.mjs (copy) and lib.rs (resolve)
          # must append `.exe` on win32. Enable once that's handled:
          # - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential curl wget file libxdo-dev libssl-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Set up Bun # needed by sidecar/stage.mjs at bundle time
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Rust is taken from src-tauri/rust-toolchain.toml automatically;
      # this just caches the registry + target dir between runs.
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies # postinstall also installs the sidecars
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Desktop OSS ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
