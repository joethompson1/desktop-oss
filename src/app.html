<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Desktop OSS</title>
    <style>
      :root {
        color-scheme: light dark;

        /* Dark theme — tuned to Claude Code Desktop */
        --bg: #1f1f1f;
        --bg-elevated: #2a2a2a;
        --bg-sidebar: #262626;
        --bg-input: #2a2a2a;
        --text: #ececec;
        --text-muted: #a1a1a1;
        --text-faint: #6e6e6e;
        --border: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.12);
        --hover-bg: rgba(255, 255, 255, 0.04);
        --active-bg: rgba(255, 255, 255, 0.07);
        --accent: #4f7cff;
        --accent-hover: #3d6ae0;
        --accent-text: #7ea2ff;
        --success: #3fb950;
        --warn: #d2a106;
        --danger: #f85149;
        --danger-text: #ff8b80;
        --bubble-user-bg: #2a2a2a;
        --bubble-user-text: var(--text);
        --code-bg: #0d0d0d;
        --code-inline-bg: rgba(255, 255, 255, 0.06);
        --kbd-bg: rgba(255, 255, 255, 0.08);
        --kbd-text: #c9c9c9;
        --diff-add-fg: #5fb04f;
        --diff-del-fg: #d75353;

        /* Shared surface elevation — used by sidebar, prompt bar, and any
           future floating card. Pair `--surface-shadow` with `--surface-ring`
           on the same `box-shadow` declaration. The ring is a 1px inset-style
           outline that keeps rounded corners clean without taking layout. */
        --surface-shadow: 0 2px 20px rgba(0, 0, 0, 0.12);
        --surface-ring: 0 0 0 1px rgba(0, 0, 0, 0.07);

        /* Code-block header chrome — sits above the Atom One body. Tuned
           per scheme so it always reads as a header, never as a clash. */
        --code-header-bg: rgba(46, 56, 66, 1);
        --code-header-text: rgba(255, 255, 255, 0.7);
        --code-header-text-strong: #ffffff;
        --code-header-hover-bg: rgba(255, 255, 255, 0.08);
        --code-copy-success: #c3e88d;

        /* Shared chat/cockpit type scale.  --text-body is the canonical body
           size: chat-message body, cockpit assistant text, composer textarea.
           --text-meta is the inline-affordance size: tool entries, status
           pill, "Show output…" / "Hide details" buttons. */
        --text-body: 1em;
        --text-meta: 0.92em;
        --text-caption: 0.82em;
        --code-mono: "SF Mono", Menlo, Consolas, monospace;

        /* Right-dock (module panels) geometry — see RightDock.svelte and
           the main padding-right rules in +layout.svelte. */
        --right-rail-width: 44px;
        --right-panel-width: 340px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --bg-elevated: #f5f5f4;
          --bg-sidebar: rgb(253, 253, 252);
          --bg-input: #ffffff;
          --text: #1f1f1f;
          --text-muted: #666666;
          --text-faint: #9a9a9a;
          --border: rgba(0, 0, 0, 0.07);
          --border-strong: rgba(0, 0, 0, 0.14);
          --hover-bg: rgba(0, 0, 0, 0.04);
          --active-bg: rgba(0, 0, 0, 0.06);
          --accent: #2563eb;
          --accent-hover: #1d4ed8;
          --accent-text: #2563eb;
          --success: #16a34a;
          --warn: #b45309;
          --danger: #dc2626;
          --danger-text: #b91c1c;
          --bubble-user-bg: #eef0f3;
          --bubble-user-text: var(--text);
          /* Code blocks stay dark in both themes — matches editor norms */
          --code-bg: #0f0f0f;
          --code-inline-bg: rgba(0, 0, 0, 0.05);
          --kbd-bg: rgba(0, 0, 0, 0.08);
          --kbd-text: #444444;
          --diff-add-fg: #4a9d3f;
          --diff-del-fg: #c14747;

          --surface-shadow: 0 2px 20px rgba(15, 23, 42, 0.08);
          --surface-ring: 0 0 0 1px rgba(15, 23, 42, 0.08);

          /* Light header sits a few % darker than Atom One Light's #fafafa
             body — soft hierarchy without harsh contrast. Text uses the
             theme's mono-2 muted gray. */
          --code-header-bg: #eef0f3;
          --code-header-text: #686b77;
          --code-header-text-strong: #383a42;
          --code-header-hover-bg: rgba(0, 0, 0, 0.06);
          --code-copy-success: #50a14f;
        }
      }

      html {
        font-size: 13px;
      }

      html,
      body {
        background: var(--bg);
        color: var(--text);
      }

      /* Scrollbar — always-visible thin thumb, Claude Code style */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.22);
      }
      @media (prefers-color-scheme: light) {
        ::-webkit-scrollbar-thumb {
          background: rgba(0, 0, 0, 0.12);
        }
        ::-webkit-scrollbar-thumb:hover {
          background: rgba(0, 0, 0, 0.22);
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
